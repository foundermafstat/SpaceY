map $http_upgrade $spacey_connection_upgrade { default upgrade; '' close; }

upstream spacey_prod_web { server 127.0.0.1:7790; }
upstream spacey_dev_web { server 127.0.0.1:47790; }
upstream spacey_dev_api { server 127.0.0.1:47800; }
upstream spacey_dev_battle { server 127.0.0.1:47801; }
upstream spacey_dev_admin_web { server 127.0.0.1:47803; }
upstream spacey_dev_admin_api { server 127.0.0.1:47802; }
upstream spacey_dev_bot { server 127.0.0.1:47804; }

server {
  listen 80; listen [::]:80;
  server_name spacey.aima.space dev.spacey.aima.space staging.spacey.aima.space
    public.spacey.aima.space admin.spacey.aima.space admin-dev.spacey.aima.space
    admin-staging.spacey.aima.space;
  location ^~ /.well-known/acme-challenge/ { root /var/www/html; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl http2; listen [::]:443 ssl http2;
  server_name spacey.aima.space;
  ssl_certificate /etc/letsencrypt/live/spacey.aima.space/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/spacey.aima.space/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  location / { proxy_pass http://spacey_prod_web; include /etc/nginx/proxy_params; }
}

server {
  listen 443 ssl http2; listen [::]:443 ssl http2;
  server_name dev.spacey.aima.space;
  ssl_certificate /etc/letsencrypt/live/spacey-dev/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/spacey-dev/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  client_max_body_size 2m;
  location = /health { proxy_pass http://spacey_dev_api/health; include /etc/nginx/proxy_params; }
  location = /openapi.json { proxy_pass http://spacey_dev_api/openapi.json; include /etc/nginx/proxy_params; }
  location /api/ { proxy_pass http://spacey_dev_api; include /etc/nginx/proxy_params; }
  location /public/ { proxy_pass http://spacey_dev_api; include /etc/nginx/proxy_params; }
  location = /telegram/webhook { proxy_pass http://spacey_dev_bot/webhook; include /etc/nginx/proxy_params; }
  location = /realtime/v1/battle {
    proxy_pass http://spacey_dev_battle/battle;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $spacey_connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header Origin $http_origin;
    proxy_read_timeout 75s;
    proxy_buffering off;
  }
  location / { proxy_pass http://spacey_dev_web; include /etc/nginx/proxy_params; }
}

server {
  listen 443 ssl http2; listen [::]:443 ssl http2;
  server_name admin-dev.spacey.aima.space;
  ssl_certificate /etc/letsencrypt/live/spacey-dev/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/spacey-dev/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  add_header Cache-Control "no-store" always;
  location /internal/admin/ { proxy_pass http://spacey_dev_admin_api; include /etc/nginx/proxy_params; }
  location / { proxy_pass http://spacey_dev_admin_web; include /etc/nginx/proxy_params; }
}

# Reserved hostnames fail closed until their isolated contours are running.
server {
  listen 443 ssl http2; listen [::]:443 ssl http2;
  server_name staging.spacey.aima.space public.spacey.aima.space admin.spacey.aima.space admin-staging.spacey.aima.space;
  ssl_certificate /etc/letsencrypt/live/spacey-dev/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/spacey-dev/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  return 503;
}
