map $http_upgrade $spacey_staging_connection_upgrade {
    default upgrade;
    '' close;
}

upstream spacey_staging_game_web {
    server 127.0.0.1:37790;
    keepalive 16;
}

upstream spacey_staging_api {
    server 127.0.0.1:37800;
    keepalive 32;
}

upstream spacey_staging_battle {
    hash $arg_route consistent;
    server 127.0.0.1:37801;
    keepalive 32;
}

upstream spacey_staging_telegram_bot {
    server 127.0.0.1:37804;
    keepalive 8;
}

upstream spacey_staging_admin_web {
    server 127.0.0.1:37803;
    keepalive 8;
}

upstream spacey_staging_admin_api {
    server 127.0.0.1:37802;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name staging.spacey.aima.space;
    server_tokens off;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_certificate /etc/letsencrypt/live/staging.spacey.aima.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.spacey.aima.space/privkey.pem;

    client_max_body_size 1m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /health {
        proxy_pass http://spacey_staging_api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /openapi.json {
        proxy_pass http://spacey_staging_api/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 10s;
    }

    location /api/ {
        proxy_pass http://spacey_staging_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /public/ {
        proxy_pass http://spacey_staging_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location = /realtime/v1/battle {
        proxy_pass http://spacey_staging_battle/battle;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $spacey_staging_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_buffering off;
        proxy_socket_keepalive on;
        proxy_read_timeout 75s;
        proxy_send_timeout 15s;
    }

    location = /telegram/webhook {
        proxy_pass http://spacey_staging_telegram_bot/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 15s;
    }

    location / {
        proxy_pass http://spacey_staging_game_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }
}

# Private ingress only. A Zero Trust/VPN tunnel terminates at this loopback listener.
server {
    listen 127.0.0.1:38443;
    server_name admin-staging.spacey.aima.space;
    server_tokens off;
    client_max_body_size 1m;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Cache-Control "no-store" always;

    location /internal/admin/ {
        proxy_pass http://spacey_staging_admin_api;
        proxy_http_version 1.1;
        proxy_set_header Host admin-staging.spacey.aima.space;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass http://spacey_staging_admin_web;
        proxy_http_version 1.1;
        proxy_set_header Host admin-staging.spacey.aima.space;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }
}

server {
    listen 80;
    server_name staging.spacey.aima.space;
    return 301 https://$host$request_uri;
}
