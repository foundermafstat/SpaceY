limit_req_zone $binary_remote_addr zone=spacey_public_per_ip:10m rate=10r/s;

upstream spacey_public_api {
    include /etc/spacey/nginx/active/api.conf;
    keepalive 64;
}

server {
    listen 443 ssl http2;
    server_name public.spacey.aima.space;
    server_tokens off;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_certificate /etc/letsencrypt/live/public.spacey.aima.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/public.spacey.aima.space/privkey.pem;

    client_max_body_size 64k;
    limit_req_status 429;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header X-Frame-Options DENY always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /health {
        proxy_pass http://spacey_public_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /openapi.json {
        proxy_pass http://spacey_public_api/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 10s;
    }

    location ^~ /public/v1/ {
        limit_req zone=spacey_public_per_ip burst=30 nodelay;
        limit_except GET POST OPTIONS { deny all; }
        proxy_pass http://spacey_public_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    server_name public.spacey.aima.space;
    return 301 https://$host$request_uri;
}
