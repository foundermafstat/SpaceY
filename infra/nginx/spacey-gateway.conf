map $http_upgrade $spacey_connection_upgrade {
    default upgrade;
    '' close;
}

upstream spacey_game_web {
    include /etc/spacey/nginx/active/game-web.conf;
    keepalive 32;
}

upstream spacey_api {
    include /etc/spacey/nginx/active/api.conf;
    keepalive 64;
}

upstream spacey_battle {
    hash $arg_route consistent;
    include /etc/spacey/nginx/active/battle-worker.conf;
    keepalive 64;
}

upstream spacey_telegram_bot {
    include /etc/spacey/nginx/active/telegram-bot.conf;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name spacey.aima.space;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_certificate /etc/letsencrypt/live/spacey.aima.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spacey.aima.space/privkey.pem;

    client_max_body_size 1m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /health {
        proxy_pass http://spacey_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location /api/ {
        proxy_pass http://spacey_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /public/ {
        proxy_pass http://spacey_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location = /realtime/v1/battle {
        proxy_pass http://spacey_battle/battle;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $spacey_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 15s;
    }

    location = /telegram/webhook {
        proxy_pass http://spacey_telegram_bot/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 15s;
    }

    location / {
        proxy_pass http://spacey_game_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }
}

server {
    listen 80;
    server_name spacey.aima.space;
    return 301 https://$host$request_uri;
}
