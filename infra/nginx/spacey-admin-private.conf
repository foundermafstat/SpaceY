# Bind only to loopback. A Zero Trust tunnel or VPN terminates client TLS and forwards here.
upstream spacey_admin_web {
    include /etc/spacey/nginx/active/admin-web.conf;
    keepalive 16;
}

upstream spacey_admin_api {
    include /etc/spacey/nginx/active/admin-api.conf;
    keepalive 16;
}

server {
    listen 127.0.0.1:8443;
    server_name admin.spacey.aima.space;
    server_tokens off;

    client_max_body_size 1m;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Cache-Control "no-store" always;
    add_header X-Frame-Options DENY always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /internal/admin/v1/health {
        proxy_pass http://spacey_admin_api;
        proxy_http_version 1.1;
        proxy_set_header Host admin.spacey.aima.space;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location /internal/admin/ {
        proxy_pass http://spacey_admin_api;
        proxy_http_version 1.1;
        proxy_set_header Host admin.spacey.aima.space;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host admin.spacey.aima.space;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass http://spacey_admin_web;
        proxy_http_version 1.1;
        proxy_set_header Host admin.spacey.aima.space;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-Host admin.spacey.aima.space;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }
}
